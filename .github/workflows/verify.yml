name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Verify the draw (only when beacon and result are filled)
        run: |
          python - <<'PY'
          import json, subprocess, sys
          from pathlib import Path

          def filled(path: str) -> bool:
              try:
                  data = json.loads(Path(path).read_text(encoding="utf-8"))
              except FileNotFoundError:
                  return False
              return not data.get("placeholder")

          if filled("beacon.json") and filled("result.json"):
              print("beacon.json and result.json are filled: running verify_draw.py")
              sys.exit(subprocess.run([sys.executable, "verify_draw.py"]).returncode)
          print("Placeholder beacon/result: skipping verify_draw.py (pre-draw state).")
          PY
